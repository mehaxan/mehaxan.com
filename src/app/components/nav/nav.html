<header class="nav-shell" [class.is-scrolled]="scrolled()">
  <div class="nav-pill">
    <a class="nav-mark" href="#hero" (click)="scrollTo('#hero', $event)" aria-label="Mehaxan — home">
      <span class="mark-glyph">M</span>
      <span class="mark-text">mehaxan</span>
      <span class="mark-cursor" aria-hidden="true">_</span>
    </a>

    <nav class="nav-rail" aria-label="Section navigation">
      @for (link of links; track link.href) {
        <a
          class="nav-rail-link"
          [class.is-active]="activeSection() === link.href.slice(1)"
          [href]="link.href"
          (click)="scrollTo(link.href, $event)"
        >
          <span class="rail-dot" aria-hidden="true"></span>
          <span class="rail-label">{{ link.label }}</span>
        </a>
      }
    </nav>

    <div class="nav-tools">
      <button
        class="theme-toggle"
        type="button"
        (click)="themeService.toggle()"
        [attr.aria-label]="themeService.theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
        [attr.data-theme]="themeService.theme()"
      >
        <span class="toggle-track" aria-hidden="true">
          <span class="toggle-thumb"></span>
          <svg class="toggle-icon toggle-icon--sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.5 1.5M17.5 17.5L19 19M5 19l1.5-1.5M17.5 6.5L19 5"/>
          </svg>
          <svg class="toggle-icon toggle-icon--moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>
          </svg>
        </span>
      </button>

      <button
        class="hamburger"
        type="button"
        (click)="toggleMobile()"
        [attr.aria-expanded]="mobileOpen()"
        aria-label="Toggle menu"
      >
        <span class="bar" [class.is-open-1]="mobileOpen()"></span>
        <span class="bar" [class.is-open-2]="mobileOpen()"></span>
      </button>
    </div>
  </div>

  <!-- Mobile sheet -->
  <div class="mobile-backdrop" [class.is-visible]="mobileOpen()" (click)="toggleMobile()" aria-hidden="true"></div>
  <nav class="mobile-sheet" [class.is-open]="mobileOpen()" [attr.aria-hidden]="!mobileOpen()">
    <p class="mobile-eyebrow">Index</p>
    <ul>
      @for (link of links; track link.href; let i = $index) {
        <li>
          <a
            class="mobile-link"
            [class.is-active]="activeSection() === link.href.slice(1)"
            [href]="link.href"
            (click)="scrollTo(link.href, $event)"
          >
            <span class="mobile-num">0{{ i + 1 }}</span>
            <span>{{ link.label }}</span>
          </a>
        </li>
      }
    </ul>
    <div class="mobile-foot">
      <span class="status-pill"><span class="dot"></span>Available · 2026</span>
    </div>
  </nav>
</header>
